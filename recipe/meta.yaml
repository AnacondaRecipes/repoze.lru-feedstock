{% set name = "repoze.lru" %}
{% set version = "0.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/repoze-lru/repoze_lru-0.8.tar.gz
  sha256: a252408cd93fe670c88d6665b96fe5d42e071dba2507a1f21a1e609ae4fa891a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools
    - pip
    - wheel
  run:
    - python

test:
  imports:
    - repoze
    - repoze.lru
  requires:
    - pip
  commands:
    - pip check

about:
  home: http://www.repoze.org/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  license_family: BSD
  summary: A tiny LRU cache implementation and decorator
  description: |
    The Repoze project is a collection of technologies which bridges the WSGI
    and Zope worlds.
  doc_url: https://repoze.readthedocs.io/
  dev_url: https://github.com/repoze/

extra:
  recipe-maintainers:
    - nehaljwani
  skip-lints:
    - http_url
